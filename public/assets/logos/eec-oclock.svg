<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>
  <!-- Black background -->
  <rect width="400" height="240" fill="#000000"/>
  <!-- Decorative circle -->
  <circle cx="200" cy="100" r="60" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  <!-- E E monogram -->
  <text x="175" y="120" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', serif" font-weight="700" font-size="70" fill="white" letter-spacing="-5">E</text>
  <text x="225" y="120" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', serif" font-weight="700" font-size="70" fill="white" letter-spacing="-5">E</text>
  <!-- Clock hands -->
  <line x1="200" y1="100" x2="200" y2="65" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="100" x2="225" y2="85" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="200" cy="100" r="3" fill="#C9A84C"/>
  <!-- Decorative corner accents -->
  <path d="M135 40 L145 40 L145 42 L137 42 L137 50 L135 50 Z" fill="#C9A84C"/>
  <path d="M265 40 L255 40 L255 42 L263 42 L263 50 L265 50 Z" fill="#C9A84C"/>
  <path d="M135 160 L145 160 L145 158 L137 158 L137 150 L135 150 Z" fill="#C9A84C"/>
  <path d="M265 160 L255 160 L255 158 L263 158 L263 150 L265 150 Z" fill="#C9A84C"/>
  <!-- Brand name -->
  <text x="200" y="205" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="24" fill="white" letter-spacing="8">EEC O'CLOCK</text>
</svg>
